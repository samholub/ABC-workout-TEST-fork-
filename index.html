var FORM_CUES={"bss-a":["Push the floor away with your front foot","Front shin vertical, knee tracks over toes","Back leg provides balance, not drive"],"bss-c":["Push the floor away with your front foot","Front shin vertical, knee tracks over toes","Back leg provides balance, not drive"],pushup:["Hands slightly wider than shoulders, fingers spread","Straight line from head to heels, brace core","Lower until chest nearly touches, elbows ~45\u00b0"],"carry-a":["Walk tall, don't lean away from the weight","Core fights the offset load","Controlled breathing, vertical spine"],"carry-b":["Walk tall, don't lean away from the weight","Core fights the offset load","Controlled breathing, vertical spine"],"carry-mc":["Walk tall, don't lean away from the weight","Core fights the offset load","Controlled breathing, vertical spine"],"sldl-b":["Push floor away with standing leg","Reach lifted leg toward wall behind you","Hip crease deepens, neutral spine"],"sldl-c":["Push floor away with standing leg","Reach lifted leg toward wall behind you","Hip crease deepens, neutral spine"],row:["Pull elbow to ribs, not out to the side","Keep torso square, no rotation","Squeeze shoulder blade back and down at top"],pullup:["Start from full dead hang","Squeeze lats, shoulder blades down and together","Controlled lowering every rep, no kipping"],"pullup-mc":["Start from full dead hang","Squeeze lats, shoulder blades down and together","Controlled lowering every rep, no kipping"],ohp:["Brace core, ribs stay down","Press straight up, lock out overhead","Control weight back to shoulder"],tgu:["Move slowly through each position","Eye on the weight throughout","Each position stable before transitioning"]};

var SESSIONS={A:{label:"Session A",time:"15 min",color:"#F59E0B",exercises:[{id:"bss-a",name:"Bulgarian Split Squats",sets:3,reps:"8-10/leg",hasWeight:true},{id:"pushup",name:"Push-Ups",sets:3,reps:"8-15",hasWeight:false},{id:"carry-a",name:"Suitcase Carry",sets:3,reps:"40 yd/side",hasWeight:true,isCarry:true}]},B:{label:"Session B",time:"15 min",color:"#3B82F6",exercises:[{id:"sldl-b",name:"Single-Leg Deadlifts",sets:3,reps:"8-10/leg",hasWeight:true},{id:"row",name:"Single-Arm Rows",sets:3,reps:"8-12/arm",hasWeight:true},{id:"carry-b",name:"Carries",sets:3,reps:"40 yd/side",hasWeight:true,isCarry:true}]},C:{label:"Session C",time:"20 min",color:"#10B981",exercises:[{id:"bss-c",name:"Bulgarian Split Squats",sets:3,reps:"8-10/leg",hasWeight:true},{id:"pullup",name:"Pull-Ups / Chin-Ups",sets:3,reps:"max reps",hasWeight:false,note:"Sets 1-2: Pull-ups. Final set: Chin-ups"},{id:"sldl-c",name:"Single-Leg Deadlifts",sets:3,reps:"8-10/leg",hasWeight:true}]},modC:{label:"Modified C",time:"15-18 min",color:"#8B5CF6",subtitle:"After A+B double-day",exercises:[{id:"ohp",name:"SA Overhead Press",sets:3,reps:"8-10/arm",hasWeight:true},{id:"pullup-mc",name:"Pull-Ups / Chin-Ups",sets:3,reps:"max reps",hasWeight:false,note:"Sets 1-2: Pull-ups. Final set: Chin-ups"},{id:"carry-mc",name:"Carries",sets:3,reps:"40 yd/side",hasWeight:true,isCarry:true,note:"From dropped B session"}]},TGU:{label:"Turkish Get-Up",time:"15 min",color:"#EC4899",subtitle:"Optional variety session",exercises:[{id:"tgu",name:"Turkish Get-Up",sets:1,reps:"5/side",hasWeight:true,note:"Light-moderate weight. Movement quality focus"}]}};

var WARMUPS=[{id:"enhanced",label:"Enhanced 3D",time:"8-10 min",icon:"\u{1F525}",steps:["Hip Mobility (3 min): 90/90 transitions 5-8/side, deep squat hold 30-60s, hip circles 10 each","3D Lunge Matrix (3 min): 2x5 each - forward, lateral, curtsy lunges","Upper Body (2-3 min): Thoracic rotations 8/side, scapular pulls or dead hang, easy push-ups 5-8","Integration (1 min): Inchworms 3-5, World's Greatest Stretch 3-5/side"]},{id:"standard",label:"Standard 3D",time:"5 min",icon:"\u26a1",steps:["2x5 each direction: Forward lunges, lateral lunges, curtsy lunges"]},{id:"hip",label:"Hip Mobility",time:"5 min",icon:"\u{1F9B5}",steps:["General movement (1 min): Jumping jacks, arm circles","Hip mobility (2 min): Leg swings fwd/back 10 each, side-to-side 10 each, hip circles 10 each","Movement prep (2 min): BW squats 10, easy push-ups 5-10, dead hang 30s"]},{id:"quick",label:"Emergency",time:"1-3 min",icon:"\u{1F4A8}",steps:["20 jumping jacks + 10 bodyweight squats. That's it. Go."]}];

var CYCLE=["A","B","C"];

// ===== PROGRESSION ENGINE CONFIG =====
var PROG={
"bss-a":{top:10,inc:5,rpe:8},"bss-c":{top:10,inc:5,rpe:8},
pushup:{top:15,inc:0,rpe:8},
"carry-a":{top:0,inc:5,rpe:7},"carry-b":{top:0,inc:5,rpe:7},"carry-mc":{top:0,inc:5,rpe:7},
"sldl-b":{top:10,inc:5,rpe:8},"sldl-c":{top:10,inc:5,rpe:8},
row:{top:12,inc:5,rpe:8},
pullup:{top:0,inc:0,rpe:9},"pullup-mc":{top:0,inc:0,rpe:9},
ohp:{top:10,inc:2.5,rpe:8},
tgu:{top:5,inc:5,rpe:7}
};

// Exercise ID groups - same movement tracked together for charts/progression
var EX_GROUP={"bss-a":"bss","bss-c":"bss",pushup:"pushup","carry-a":"carry","carry-b":"carry","carry-mc":"carry","sldl-b":"sldl","sldl-c":"sldl",row:"row",pullup:"pullup","pullup-mc":"pullup",ohp:"ohp",tgu:"tgu"};
var EX_GROUP_NAMES={bss:"Bulgarian Split Squats",pushup:"Push-Ups",carry:"Carries",sldl:"Single-Leg Deadlifts",row:"Single-Arm Rows",pullup:"Pull-Ups",ohp:"Overhead Press",tgu:"Turkish Get-Up"};
function getGroupIds(exId){var g=EX_GROUP[exId];return Object.keys(EX_GROUP).filter(function(k){return EX_GROUP[k]===g})}

// ========================================================================
// 4. ANALYTICS & METRICS
//    e1RM, volume tracking, ACWR, PR detection, fatigue classification, deload triggers
// ========================================================================

function calcE1RM(w,r){if(!w||w<=0||!r||r<=0)return 0;if(r===1)return w;return Math.round(w*(1+r/30))}
function getExE1RM(exId,logs){var gids=getGroupIds(exId);var pts=[];for(var i=logs.length-1;i>=0;i--){var l=logs[i];if(!l.exercises)continue;var ex=l.exercises.find(function(x){return gids.indexOf(x.id)!==-1&&x.sets&&x.sets.length>0});if(ex){var best=0;ex.sets.forEach(function(s){var e=calcE1RM(s.weight||0,s.reps||0);if(e>best)best=e});if(best>0)pts.push({date:l.date,e1rm:best})}}return pts.slice(-12).reverse()}

function detectPRs(exId,currentSets,logs){var gids=getGroupIds(exId);var prs=[];var bestWeight=0,bestReps={},bestE1RM=0;
for(var i=0;i<logs.length;i++){var l=logs[i];if(!l.exercises)continue;var ex=l.exercises.find(function(x){return gids.indexOf(x.id)!==-1&&x.sets&&x.sets.length>0});if(ex)ex.sets.forEach(function(s){if(s.weight>bestWeight)bestWeight=s.weight;var key=s.weight||0;if(!bestReps[key]||s.reps>bestReps[key])bestReps[key]=s.reps;var e=calcE1RM(s.weight||0,s.reps||0);if(e>bestE1RM)bestE1RM=e})}
currentSets.forEach(function(s,i){if(!s.completed)return;var reasons=[];if(s.weight>0&&s.weight>bestWeight)reasons.push("weight");var key=s.weight||0;if(s.reps>0&&(!bestReps[key]||s.reps>bestReps[key]))reasons.push("reps");var e=calcE1RM(s.weight||0,s.reps||0);if(e>0&&e>bestE1RM)reasons.push("e1rm");if(reasons.length>0)prs.push({setIdx:i,reasons:reasons})});return prs}

function getGhostSets(exId,logs){var gids=getGroupIds(exId);for(var i=0;i<logs.length;i++){var l=logs[i];if(!l.exercises)continue;var ex=l.exercises.find(function(x){return gids.indexOf(x.id)!==-1&&x.sets&&x.sets.length>0});if(ex)return ex.sets}return null}

function calcVolume(logs,days){var cutoff=Date.now()-days*864e5;var vol={};logs.forEach(function(l){if(new Date(l.date).getTime()<cutoff)return;if(!l.exercises)return;l.exercises.forEach(function(ex){var g=EX_GROUP[ex.id]||ex.id;if(!vol[g])vol[g]=0;ex.sets.forEach(function(s){vol[g]+=(s.weight||0)*(s.reps||0)})})});return vol}
function calcTotalVolume(logs,days){var v=calcVolume(logs,days);var t=0;Object.keys(v).forEach(function(k){t+=v[k]});return t}
function calcACWR(logs){var acute=calcTotalVolume(logs,7);var chronic=calcTotalVolume(logs,28)/4;if(chronic<1)return null;return Math.round(acute/chronic*100)/100}

function classifyFatigue(exercises,exData){if(!exercises||exercises.length<2)return null;var rpeByPos=[];exercises.forEach(function(ex,i){var sets=exData[ex.id]||[];var rpes=sets.filter(function(s){return s.completed&&s.rpe>0}).map(function(s){return s.rpe});if(rpes.length>0){var avg=rpes.reduce(function(a,v){return a+v},0)/rpes.length;rpeByPos.push({pos:i,avg:avg})}});if(rpeByPos.length<2)return null;var allHigh=rpeByPos.every(function(r){return r.avg>=8});if(allHigh)return{type:"systemic",msg:"All exercises RPE \u22658. Check sleep, stress, and recovery."};var rising=true;for(var i=1;i<rpeByPos.length;i++){if(rpeByPos[i].avg<=rpeByPos[i-1].avg){rising=false;break}}if(rising&&rpeByPos[rpeByPos.length-1].avg-rpeByPos[0].avg>=1.5)return{type:"endurance",msg:"RPE rose \u22651.5 through session. Consider shorter rest or fewer sets."};return null}

function shouldDeload(logs){if(logs.length<6)return false;var recent=logs.slice(0,6);var rpeUp=0,rdDown=0;for(var i=0;i<recent.length-1;i++){var exRPEs=[];if(recent[i].exercises)recent[i].exercises.forEach(function(ex){ex.sets.forEach(function(s){if(s.rpe>0)exRPEs.push(s.rpe)})});var prevRPEs=[];if(recent[i+1].exercises)recent[i+1].exercises.forEach(function(ex){ex.sets.forEach(function(s){if(s.rpe>0)prevRPEs.push(s.rpe)})});if(exRPEs.length>0&&prevRPEs.length>0){var avgC=exRPEs.reduce(function(a,v){return a+v},0)/exRPEs.length;var avgP=prevRPEs.reduce(function(a,v){return a+v},0)/prevRPEs.length;if(avgC>avgP)rpeUp++}if(recent[i].readiness&&recent[i+1].readiness){var rC=recent[i].readiness.sleep+recent[i].readiness.soreness+recent[i].readiness.motivation;var rP=recent[i+1].readiness.sleep+recent[i+1].readiness.soreness+recent[i+1].readiness.motivation;if(rC<rP)rdDown++}}return rpeUp>=3&&rdDown>=2}


// ========================================================================
// 5. RECOMMENDATIONS & DECISION HELPERS
//    Progression engine, smart warmup, training focus, session count
// ========================================================================

// These are the key functions that drive workout suggestions.
// To change how the app recommends weights, warmups, or deload timing,
// edit the functions in this section.
//
//   getProgression()   — Should the user increase weight? (RPE-gated, 2-session rule)
//   getSuggestedLoad() — What weight to start with today (uses progression + readiness + context)
//   getSmartWarmup()   — Which warmup fits readiness + session type?
//   getPeriodPhase()   — Training focus based on session count (not calendar)
//   getSessionCount()  — Total non-manual sessions logged
//   getAvgTime()       — Average duration for a session type
//   getFatigueTrend()  — 3-session lookback for creeping fatigue (soft advisory)
//   getBalanceAdvisory() — Detect neglected session types in recent history

// Session count and training focus — based on sessions logged, not calendar
function getSessionCount(logs){var c=0;for(var i=0;i<logs.length;i++){if(!logs[i].manual)c++}return c}
function getPeriodPhase(sessionCount){if(sessionCount<=8)return{phase:"early",msg:"Establish working weights",clr:"#60A5FA"};if(sessionCount<=20)return{phase:"building",msg:"Build consistency",clr:"#A78BFA"};if(sessionCount<=40)return{phase:"established",msg:"Normal progression",clr:"#FBBF24"};return{phase:"experienced",msg:"Maintain and progress",clr:"#10B981"}}
function getProgression(exId,logs,readiness,sessionCount){
var cfg=PROG[exId];if(!cfg||cfg.inc===0)return null;
var groupIds=getGroupIds(exId);
var history=[];
for(var i=0;i<logs.length&&history.length<2;i++){
var l=logs[i];if(!l.exercises)continue;
var ex=l.exercises.find(function(x){return groupIds.indexOf(x.id)!==-1&&x.sets&&x.sets.length>0});
if(ex){var sets=ex.sets;var avgReps=sets.reduce(function(a,s){return a+(s.reps||0)},0)/sets.length;
var rpes=sets.filter(function(s){return s.rpe>0});var avgRPE=rpes.length?rpes.reduce(function(a,s){return a+s.rpe},0)/rpes.length:0;
var maxW=Math.max.apply(null,sets.map(function(s){return s.weight||0}));
history.push({reps:avgReps,rpe:avgRPE,weight:maxW})}}
if(history.length<2)return null;
var h0=history[0],h1=history[1];
var rdScore=readiness?readiness.sleep+readiness.soreness+readiness.motivation:6;
if(rdScore<=4)return{type:"maintain",msg:"Readiness \u22644/9 \u2014 maintain current load"};
var phase=getPeriodPhase(sessionCount||0);
if(cfg.top>0){
if(h0.reps>=cfg.top&&h1.reps>=cfg.top&&h0.rpe>0&&h1.rpe>0&&h0.rpe<=cfg.rpe&&h1.rpe<=cfg.rpe){
var msg="2 sessions at target reps + RPE \u2192 "+(h0.weight+cfg.inc)+" lbs";
if(phase.phase==="early")msg="Reps and RPE on track \u2192 try "+(h0.weight+cfg.inc)+" lbs";
if(phase.phase==="experienced")msg="Progression criteria met \u2192 "+(h0.weight+cfg.inc)+" lbs";
return{type:"progress",msg:msg,weight:h0.weight+cfg.inc}}
if(h0.rpe>0&&h0.rpe>=cfg.rpe+1)return{type:"maintain",msg:"RPE above target \u2014 hold current load"};
if(h0.reps<h1.reps&&h0.weight===h1.weight)return{type:"caution",msg:"Reps dropped at same weight \u2014 check form"};
}else{
if(h0.rpe>0&&h1.rpe>0&&h0.rpe<=cfg.rpe&&h1.rpe<=cfg.rpe)
return{type:"progress",msg:"2 sessions at target RPE \u2192 "+(h0.weight+cfg.inc)+" lbs",weight:h0.weight+cfg.inc};
if(h0.rpe>0&&h0.rpe>=cfg.rpe+1)return{type:"maintain",msg:"RPE above target \u2014 hold current load"};
}return null}

// Per-exercise suggested starting load — answers "what weight do I pick up?"
// Returns { weight, reason } or null (for bodyweight exercises / no history).
function getSuggestedLoad(exId,logs,readiness,sessionCount,carryAdvisory){
var cfg=PROG[exId];
if(!cfg||cfg.inc===0)return null;
// Find last used weight from history
var gids=getGroupIds(exId);var lastW=0;
for(var i=0;i<logs.length;i++){var l=logs[i];if(!l.exercises)continue;
var ex=l.exercises.find(function(x){return gids.indexOf(x.id)!==-1&&x.sets&&x.sets.length>0});
if(ex){var w=Math.max.apply(null,ex.sets.map(function(s){return s.weight||0}));if(w>0){lastW=w;break}}}
if(!lastW)return null;
var prog=getProgression(exId,logs,readiness,sessionCount);
if(prog&&prog.type==="progress")return{weight:prog.weight,reason:prog.msg};
if(carryAdvisory)return{weight:lastW,reason:"Second session \u2014 maintain or lighten"};
if(prog)return{weight:lastW,reason:prog.msg};
return{weight:lastW,reason:null}}

function getExHistory(exId,logs){
var groupIds=getGroupIds(exId);
var pts=[];for(var i=logs.length-1;i>=0;i--){var l=logs[i];if(!l.exercises)continue;
var ex=l.exercises.find(function(x){return groupIds.indexOf(x.id)!==-1&&x.sets&&x.sets.length>0});
if(ex){var mw=Math.max.apply(null,ex.sets.map(function(s){return s.weight||0}));
var mr=Math.max.apply(null,ex.sets.map(function(s){return s.reps||0}));
var rpes=ex.sets.filter(function(s){return s.rpe>0});var ar=rpes.length?Math.round(rpes.reduce(function(a,s){return a+s.rpe},0)/rpes.length):0;
pts.push({date:l.date,weight:mw,reps:mr,rpe:ar})}}return pts.slice(-12)}

function getSmartWarmup(sessionKey,readiness,daysSince,timeAvail){
var score=readiness?readiness.sleep+readiness.soreness+readiness.motivation:7;
// Determine readiness-based warmup first
var wu;
if(daysSince!==null&&daysSince>3)wu="enhanced";
else if(score<=4)wu="enhanced";
else if(score<=6){var s=sessionKey;if(s==="A"||s==="C"||s==="bss-c"||s==="sldl-c")wu="hip";else wu="standard"}
else wu="standard";
// Apply time constraint: 15 min caps at standard/emergency
if(timeAvail&&timeAvail<=15){if(wu==="enhanced"||wu==="hip")wu="standard"}
return wu}

function getFatigueTrend(logs){

// Collect last 3 non-manual sessions with RPE data

var l=logs[i];if(l.manual)continue;

return{msg:"RPE rising across last 3 sessions. Avoid pushing progression today."};

function getBalanceAdvisory(logs,rec){
var recent=[];
for(var i=0;i<logs.length&&recent.length<9;i++){
var l=logs[i];if(l.manual)continue;
var s=l.session;if(s==="TGU")continue;
recent.push(s)}

// Count core types — modC counts as C-family

for(var i=0;i<recent.length;i++){
var s=recent[i];
